name: Bug report
description: Report a reproducible problem in DRH - Add-ons Audit.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in DRH - Add-ons Audit.

        Please complete the details below so the issue can be reproduced and reviewed.

  - type: input
    id: addon_version
    attributes:
      label: Add-on version
      description: What version of DRH - Add-ons Audit are you using?
      placeholder: "Example: 1.0.0"
    validations:
      required: true

  - type: input
    id: blender_version
    attributes:
      label: Blender version
      description: What Blender version are you using?
      placeholder: "Example: 4.2.1"
    validations:
      required: true

  - type: dropdown
    id: operating_system
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: dropdown
    id: installation_method
    attributes:
      label: Installation method
      options:
        - Blender Preferences > Add-ons > Install from Disk
        - Marketplace download
        - Manual ZIP install
        - Other
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. Open Blender
        2. Enable the add-on
        3. Open the panel
        4. Click ...
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: Expected result
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual_result
    attributes:
      label: Actual result
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: error_message
    attributes:
      label: Error message, console output, or screenshot
      description: Paste any error message or attach screenshots if available.
      placeholder: "Paste traceback, console output, or describe the visible error."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this report.
          required: true
        - label: I tested this with the latest available add-on version.
          required: false
        - label: I can reproduce this issue consistently.
          required: true
